name: CI

on:
  push:
    branches: [master, develop-v2]
  pull_request:
    branches: [master, develop-v2]

jobs:
  qualidade:
    name: Qualidade de Código
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Testes unitários
        run: npm test

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

  seguranca:
    name: Auditoria de Segurança
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Auditoria npm
        run: npm audit --audit-level=high
